<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Mentorias</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F0EEF8; --surface: #FFFFFF; --surface2: #F7F6FC;
    --purple: #7C5CBF; --purple-light: #EDE8F8; --purple-dark: #5A3E9B;
    --teal: #1AAB82; --teal-light: #D6F5EC; --teal-dark: #0E7A5C;
    --amber: #F0A500; --amber-light: #FEF3D0; --amber-dark: #B87A00;
    --coral: #E85D5D; --coral-light: #FDEAEA; --coral-dark: #B03A3A;
    --text: #1A1535; --text2: #5E5A7A; --text3: #9B97B8;
    --border: #E2DEFF;
    --shadow: 0 2px 12px rgba(124,92,191,0.08);
    --shadow-lg: 0 8px 32px rgba(124,92,191,0.14);
    --radius: 14px; --radius-sm: 8px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #5A3E9B 0%, #7C5CBF 60%, #9B7FD4 100%);
    padding: 2rem 2.5rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .header-left h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .header-left p  { font-size: 13px; color: rgba(255,255,255,0.72); margin-top: 3px; }
  .btn-add {
    background: #fff; color: var(--purple-dark); border: none; border-radius: var(--radius-sm);
    padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    transition: transform .12s, box-shadow .12s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.18); }

  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; padding: 1.5rem 2.5rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; border-left: 4px solid transparent; }
  .stat-card.purple { border-left-color: var(--purple); }
  .stat-card.teal   { border-left-color: var(--teal); }
  .stat-card.amber  { border-left-color: var(--amber); }
  .stat-card.coral  { border-left-color: var(--coral); }
  .stat-n { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-l { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }

  main { padding: 2rem 2.5rem; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; }
  .legend-dot.done    { background: var(--teal-light);  border-color: var(--teal); }
  .legend-dot.current { background: var(--amber-light); border-color: var(--amber); }
  .legend-dot.pending { background: var(--surface2);    border-color: var(--border); }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }

  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow .15s, transform .15s; }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

  .card-top { padding: 16px 18px 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .client-avatar { width: 44px; height: 44px; border-radius: 50%; font-size: 17px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
  .client-info { flex: 1; min-width: 0; margin-left: 10px; }
  .client-name { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .client-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .card-actions { display: flex; gap: 4px; }
  .icon-btn { width: 30px; height: 30px; border: none; border-radius: 7px; background: var(--surface2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background .12s, color .12s; }
  .icon-btn:hover { background: var(--purple-light); color: var(--purple); }
  .icon-btn.danger:hover { background: var(--coral-light); color: var(--coral); }

  /* SESSION LIST */
  .sessions-area { padding: 0 18px 14px; }
  .sess-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }

  .sess-list { display: flex; flex-direction: column; gap: 5px; }
  .sess-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    font-size: 13px;
  }
  .sess-row.done    { background: var(--teal-light);  border-color: var(--teal); }
  .sess-row.current { background: var(--amber-light); border-color: var(--amber); box-shadow: 0 0 0 2px rgba(240,165,0,.2); }
  .sess-row.pending { opacity: .6; }

  .sess-num {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .done    .sess-num { background: var(--teal);  color: #fff; }
  .current .sess-num { background: var(--amber); color: #fff; }
  .pending .sess-num { background: var(--border); color: var(--text3); }

  .sess-info { flex: 1; min-width: 0; }
  .sess-title { font-weight: 600; color: var(--text); font-size: 12px; }
  .done    .sess-title { color: var(--teal-dark); }
  .current .sess-title { color: var(--amber-dark); }
  .pending .sess-title { color: var(--text3); }

  .sess-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .done    .sess-date { color: var(--teal-dark); opacity: .75; }
  .current .sess-date { color: var(--amber-dark); opacity: .75; }

  .sess-edit-btn {
    background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px;
    border-radius: 4px; color: var(--text3); transition: color .12s, background .12s;
  }
  .sess-edit-btn:hover { color: var(--purple); background: var(--purple-light); }

  /* PAYMENT */
  .card-pay {
    margin: 0 18px 14px; background: var(--surface2); border-radius: var(--radius-sm);
    padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .pay-amounts { display: flex; flex-direction: column; gap: 3px; }
  .pay-total-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 500; }
  .pay-total-val   { font-size: 18px; font-weight: 700; color: var(--text); }
  .pay-expected    { font-size: 11px; color: var(--text2); }

  .status-badge { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .status-ok   { background: var(--teal-light);  color: var(--teal-dark); }
  .status-due  { background: var(--coral-light); color: var(--coral-dark); }

  .pay-history { padding: 0 18px 16px; }
  .pay-history-title { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .pay-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .pay-item:last-child { border-bottom: none; }
  .pay-date   { font-size: 12px; color: var(--text2); }
  .pay-amount { font-size: 12px; font-weight: 600; color: var(--teal-dark); }

  .card-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .btn-sess {
    flex: 1; background: var(--teal-light); color: var(--teal-dark); border: none;
    border-radius: var(--radius-sm); padding: 9px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .12s; font-family: inherit;
  }
  .btn-sess:hover { background: var(--teal); color: #fff; }
  .btn-pay {
    flex: 1; background: var(--purple-light); color: var(--purple-dark); border: none;
    border-radius: var(--radius-sm); padding: 9px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .12s; font-family: inherit;
  }
  .btn-pay:hover { background: var(--purple); color: #fff; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-icon { font-size: 52px; margin-bottom: 12px; }
  .empty h3 { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  /* MODALS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(20,10,50,.45); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 2rem; width: 100%; max-width: 420px; animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.95); opacity:0; } to { transform: scale(1); opacity:1; } }
  .modal h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: var(--surface2); outline: none;
    font-family: 'Inter', sans-serif; transition: border-color .12s;
  }
  .field input:focus, .field select:focus { border-color: var(--purple); background: #fff; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel { padding: 10px 20px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save { padding: 10px 24px; border-radius: var(--radius-sm); border: none; background: var(--purple); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-save:hover { background: var(--purple-dark); }

  @media (max-width: 600px) {
    header { padding: 1.25rem; }
    .summary { padding: 1rem 1.25rem; }
    main { padding: 1rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>✨ Painel de Mentorias</h1>
    <p>Controle de sessões e pagamentos dos seus clientes</p>
  </div>
  <button class="btn-add" onclick="openAdd()">+ Novo cliente</button>
</header>

<div class="summary">
  <div class="stat-card purple"><div class="stat-n" id="s-clients">0</div><div class="stat-l">Clientes</div></div>
  <div class="stat-card teal">  <div class="stat-n" id="s-sessions">0</div><div class="stat-l">Sessões feitas</div></div>
  <div class="stat-card amber"> <div class="stat-n" id="s-paid">R$ 0</div><div class="stat-l">Total recebido</div></div>
  <div class="stat-card coral"> <div class="stat-n" id="s-due">R$ 0</div><div class="stat-l">A receber</div></div>
</div>

<main>
  <div class="section-title">Seus clientes</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot done"></div> Sessão realizada</div>
    <div class="legend-item"><div class="legend-dot current"></div> Próxima sessão</div>
    <div class="legend-item"><div class="legend-dot pending"></div> Sessões futuras</div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</main>

<!-- MODAL CLIENTE -->
<div class="overlay" id="clientModal" onclick="if(event.target===this)closeModal('clientModal')">
  <div class="modal">
    <h2 id="modalTitle">Novo cliente</h2>
    <div class="field"><label>Nome do cliente</label><input id="fName" placeholder="Ex: Roberta" /></div>
    <div class="modal-row">
      <div class="field"><label>Sessões por ciclo</label>
        <select id="fCycle">
          <option value="3">3 sessões</option><option value="4">4 sessões</option>
          <option value="5" selected>5 sessões</option><option value="6">6 sessões</option>
          <option value="8">8 sessões</option><option value="10">10 sessões</option>
        </select>
      </div>
      <div class="field"><label>Valor por ciclo (R$)</label><input id="fValue" type="number" placeholder="Ex: 300" min="0" /></div>
    </div>
    <div class="field"><label>Cor do cliente</label>
      <select id="fColor">
        <option value="#7C5CBF">🟣 Roxo</option><option value="#1AAB82">🟢 Verde</option>
        <option value="#E85D5D">🔴 Coral</option><option value="#F0A500">🟡 Âmbar</option>
        <option value="#3B82F6">🔵 Azul</option><option value="#E0529E">🩷 Rosa</option>
        <option value="#5A7FA6">🔷 Azul Aço</option><option value="#8B5E3C">🟤 Marrom</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('clientModal')">Cancelar</button>
      <button class="btn-save" onclick="saveClient()">Salvar cliente</button>
    </div>
  </div>
</div>

<!-- MODAL SESSÃO -->
<div class="overlay" id="sessModal" onclick="if(event.target===this)closeModal('sessModal')">
  <div class="modal">
    <h2 id="sessModalTitle">📅 Registrar sessão</h2>
    <div class="field"><label>Data da sessão</label><input id="sDate" type="date" /></div>
    <div class="field"><label>Observação (opcional)</label><input id="sNote" placeholder="Ex: tema abordado, destaque..." /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('sessModal')">Cancelar</button>
      <button class="btn-save" onclick="saveSess()">Confirmar sessão</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR SESSÃO -->
<div class="overlay" id="editSessModal" onclick="if(event.target===this)closeModal('editSessModal')">
  <div class="modal">
    <h2>✏️ Editar sessão</h2>
    <div class="field"><label>Data da sessão</label><input id="eDate" type="date" /></div>
    <div class="field"><label>Observação</label><input id="eNote" placeholder="Ex: tema abordado..." /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('editSessModal')">Cancelar</button>
      <button class="btn-save" onclick="saveEditSess()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PAGAMENTO -->
<div class="overlay" id="payModal" onclick="if(event.target===this)closeModal('payModal')">
  <div class="modal">
    <h2>💰 Registrar pagamento</h2>
    <div class="field"><label>Valor recebido (R$)</label><input id="pValue" type="number" placeholder="0,00" min="0" /></div>
    <div class="field"><label>Data do pagamento</label><input id="pDate" type="date" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('payModal')">Cancelar</button>
      <button class="btn-save" onclick="savePay()">Confirmar</button>
    </div>
  </div>
</div>

<script>
  const COLORS_LIGHT = {
    "#7C5CBF":"#EDE8F8","#1AAB82":"#D6F5EC","#E85D5D":"#FDEAEA",
    "#F0A500":"#FEF3D0","#3B82F6":"#DBEAFE","#E0529E":"#FCE4F3",
    "#5A7FA6":"#DEE9F5","#8B5E3C":"#F0E6DC"
  };

  let clients = JSON.parse(localStorage.getItem('mentoria_v3') || '[]');
  let editId = null, payTarget = null, sessTarget = null, editSessTarget = null;

  function save() { localStorage.setItem('mentoria_v3', JSON.stringify(clients)); }

  function fmt(n) {
    return 'R$ ' + parseFloat(n||0).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  function fmtDateBR(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function initials(name) {
    return name.trim().split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  }

  function todayISO() { return new Date().toISOString().slice(0,10); }

  function render() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    let totalSess=0, totalPaid=0, totalDue=0;

    clients.forEach((c, ci) => {
      const cycle = c.cycle || 5;
      const sessArr = c.sessionsData || [];
      const doneSess = sessArr.filter(s=>s.done);
      const totalDone = doneSess.length;
      const posInCycle = totalDone % cycle;
      const cyclesDone = Math.floor(totalDone / cycle);
      const expected = cyclesDone * c.value;
      const debt = Math.max(0, expected - (c.paid||0));

      totalSess += totalDone;
      totalPaid += (c.paid||0);
      totalDue  += debt;

      const color = c.color || '#7C5CBF';

      // Build session rows for current cycle
      const currentCycleStart = cyclesDone * cycle;
      let sessRows = '';
      for (let s = 0; s < cycle; s++) {
        const globalIdx = currentCycleStart + s;
        const sd = sessArr[globalIdx];
        const isDone = sd && sd.done;
        const isCurrent = !isDone && s === posInCycle;
        const cls = isDone ? 'done' : isCurrent ? 'current' : 'pending';
        const label = isDone ? `Sessão ${s+1}` : isCurrent ? `Sessão ${s+1} — próxima` : `Sessão ${s+1}`;
        const dateStr = sd && sd.date ? `📅 ${fmtDateBR(sd.date)}${sd.note ? ' · '+sd.note : ''}` : (isCurrent ? 'Ainda não agendada' : '—');
        const editBtn = isDone ? `<button class="sess-edit-btn" onclick="openEditSess(${ci},${globalIdx})" title="Editar data/nota">✏️</button>` : '';
        sessRows += `<div class="sess-row ${cls}">
          <div class="sess-num">${s+1}</div>
          <div class="sess-info">
            <div class="sess-title">${label}</div>
            <div class="sess-date">${dateStr}</div>
          </div>
          ${editBtn}
        </div>`;
      }

      let statusBadge = debt > 0
        ? `<span class="status-badge status-due">⚠️ Deve ${fmt(debt)}</span>`
        : `<span class="status-badge status-ok">✅ Em dia</span>`;

      let payHistory = '';
      const payments = c.payments || [];
      if (payments.length > 0) {
        const items = payments.slice().reverse().slice(0,4)
          .map(p=>`<div class="pay-item"><span class="pay-date">📅 ${p.date}</span><span class="pay-amount">${fmt(p.amount)}</span></div>`)
          .join('');
        payHistory = `<div class="pay-history"><div class="pay-history-title">Últimos pagamentos</div>${items}</div>`;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="client-avatar" style="background:${color}">${initials(c.name)}</div>
          <div class="client-info">
            <div class="client-name">${c.name}</div>
            <div class="client-sub">${fmt(c.value)} · ${cycle} sessões/ciclo · ${totalDone} realizada(s)</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" onclick="openEdit(${ci})" title="Editar cliente">✏️</button>
            <button class="icon-btn danger" onclick="removeClient(${ci})" title="Remover">🗑️</button>
          </div>
        </div>

        <div class="sessions-area">
          <div class="sess-label">Ciclo ${cyclesDone+1} — sessões</div>
          <div class="sess-list">${sessRows}</div>
        </div>

        <div class="card-pay">
          <div class="pay-amounts">
            <div class="pay-total-label">Total pago</div>
            <div class="pay-total-val">${fmt(c.paid)}</div>
            <div class="pay-expected">Esperado: ${fmt(expected)}</div>
          </div>
          ${statusBadge}
        </div>

        ${payHistory}

        <div class="card-footer">
          <button class="btn-sess" onclick="openSess(${ci})">+ Registrar sessão</button>
          <button class="btn-pay"  onclick="openPay(${ci})">💰 Pagamento</button>
        </div>
      `;
      grid.appendChild(card);
    });

    if (clients.length === 0) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><h3>Nenhum cliente ainda</h3><p>Clique em <strong>Novo cliente</strong> para começar.</p></div>`;
    }

    document.getElementById('s-clients').textContent = clients.length;
    document.getElementById('s-sessions').textContent = totalSess;
    document.getElementById('s-paid').textContent = fmt(totalPaid);
    document.getElementById('s-due').textContent = fmt(totalDue);
  }

  // ── CLIENT MODAL ──
  function openAdd() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'Novo cliente';
    ['fName','fValue'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fCycle').value='5';
    document.getElementById('fColor').value='#7C5CBF';
    document.getElementById('clientModal').classList.add('open');
  }
  function openEdit(i) {
    editId = i; const c = clients[i];
    document.getElementById('modalTitle').textContent = 'Editar — '+c.name;
    document.getElementById('fName').value = c.name;
    document.getElementById('fValue').value = c.value;
    document.getElementById('fCycle').value = c.cycle||5;
    document.getElementById('fColor').value = c.color||'#7C5CBF';
    document.getElementById('clientModal').classList.add('open');
  }
  function saveClient() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { alert('Informe o nome do cliente.'); return; }
    const cycle = parseInt(document.getElementById('fCycle').value)||5;
    if (editId !== null) {
      const old = clients[editId];
      clients[editId] = { ...old, name, value: parseFloat(document.getElementById('fValue').value)||0, cycle, color: document.getElementById('fColor').value };
    } else {
      clients.push({ name, value: parseFloat(document.getElementById('fValue').value)||0, cycle, color: document.getElementById('fColor').value, paid:0, payments:[], sessionsData:[] });
    }
    save(); render(); closeModal('clientModal');
  }

  // ── SESSION MODAL ──
  function openSess(i) {
    sessTarget = i;
    document.getElementById('sessModalTitle').textContent = '📅 Registrar sessão — '+clients[i].name;
    document.getElementById('sDate').value = todayISO();
    document.getElementById('sNote').value = '';
    document.getElementById('sessModal').classList.add('open');
  }
  function saveSess() {
    const date = document.getElementById('sDate').value;
    const note = document.getElementById('sNote').value.trim();
    if (!date) { alert('Selecione a data da sessão.'); return; }
    const c = clients[sessTarget];
    if (!c.sessionsData) c.sessionsData = [];
    c.sessionsData.push({ done:true, date, note });
    save(); render(); closeModal('sessModal');
  }

  // ── EDIT SESSION MODAL ──
  function openEditSess(ci, si) {
    editSessTarget = { ci, si };
    const sd = clients[ci].sessionsData[si];
    document.getElementById('eDate').value = sd.date || todayISO();
    document.getElementById('eNote').value = sd.note || '';
    document.getElementById('editSessModal').classList.add('open');
  }
  function saveEditSess() {
    const { ci, si } = editSessTarget;
    clients[ci].sessionsData[si].date = document.getElementById('eDate').value;
    clients[ci].sessionsData[si].note = document.getElementById('eNote').value.trim();
    save(); render(); closeModal('editSessModal');
  }

  // ── PAYMENT MODAL ──
  function openPay(i) {
    payTarget = i; const c = clients[i];
    const cycle = c.cycle||5;
    const done = (c.sessionsData||[]).filter(s=>s.done).length;
    const expected = Math.floor(done/cycle)*c.value;
    const debt = Math.max(0, expected-(c.paid||0));
    document.getElementById('pValue').value = debt>0 ? debt : c.value;
    document.getElementById('pDate').value = todayISO();
    document.getElementById('payModal').classList.add('open');
  }
  function savePay() {
    const amt = parseFloat(document.getElementById('pValue').value)||0;
    const dt  = document.getElementById('pDate').value;
    if (!amt) { alert('Informe o valor.'); return; }
    clients[payTarget].paid = (clients[payTarget].paid||0) + amt;
    if (!clients[payTarget].payments) clients[payTarget].payments=[];
    clients[payTarget].payments.push({ amount:amt, date:fmtDateBR(dt) });
    save(); render(); closeModal('payModal');
  }

  function removeClient(i) {
    if (confirm('Remover "'+clients[i].name+'"? Esta ação não pode ser desfeita.')) {
      clients.splice(i,1); save(); render();
    }
  }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  render();
</script>
</body>
</html>
